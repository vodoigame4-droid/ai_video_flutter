name: ai_video_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  wiwi_havin_base_ads:
    path: ../wiwi-havin-base-ads

  network:
    path: ./packages/network

  core_business:
    path: ./packages/core_business

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.2.3
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.2.0
  flutter_animate: ^4.5.2
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  cached_network_image: ^3.4.1
  sqlite3_flutter_libs: ^0.5.0
  intl: ^0.20.2
  firebase_core: ^3.9.0
  firebase_remote_config: ^5.3.1
  firebase_analytics: ^11.4.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  rxdart: ^0.28.0
  drift: ^2.20.0
  sqlite3: ^2.9.4
  path: ^1.9.1
  package_info_plus: ^9.0.1
  retrofit: ^4.4.1
  lottie: ^3.3.1
  gradient_borders: ^1.0.2
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  slang_build_runner: ^4.14.0
  flutter_gen_runner: ^5.14.1
  drift_dev: ^2.20.0
  retrofit_generator: ^10.2.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/raw/
    - assets/animations/
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/gen/
  line_length: 100

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
